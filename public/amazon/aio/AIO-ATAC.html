    <script>
    const images = [
        'https://upload.wikimedia.org/wikipedia/commons/thumb/a/a9/Amazon_logo.svg/2560px-Amazon_logo.svg.png',
        'https://media.tenor.com/1MG3j4q4W5AAAAAj/cat-jam.gif',
        'https://upload.wikimedia.org/wikipedia/commons/thumb/4/46/Bitcoin.svg/1200px-Bitcoin.svg.png',
        // Add more image paths as needed
    ];


    function createFlyingImage() {
        const container = document.getElementById('flying-images-container');
        const img = document.createElement('img');
        img.src = images[Math.floor(Math.random() * images.length)];
        img.classList.add('flying-image');

        // Set random size
        const size = Math.random() * 50 + 20; // Random size between 20px and 70px
        img.style.width = `${size}px`;
        img.style.height = 'auto';

        // Set random starting position (off-screen)
        const startSide = Math.floor(Math.random() * 4); // 0: top, 1: right, 2: bottom, 3: left
        let startX, startY, endX, endY;

        switch (startSide) {
            case 0: // top
                startX = Math.random() * window.innerWidth;
                startY = -size;
                endX = Math.random() * window.innerWidth;
                endY = window.innerHeight + size;
                break;
            case 1: // right
                startX = window.innerWidth + size;
                startY = Math.random() * window.innerHeight;
                endX = -size;
                endY = Math.random() * window.innerHeight;
                break;
            case 2: // bottom
                startX = Math.random() * window.innerWidth;
                startY = window.innerHeight + size;
                endX = Math.random() * window.innerWidth;
                endY = -size;
                break;
            case 3: // left
                startX = -size;
                startY = Math.random() * window.innerHeight;
                endX = window.innerWidth + size;
                endY = Math.random() * window.innerHeight;
                break;
        }

        img.style.left = `${startX}px`;
        img.style.top = `${startY}px`;

        container.appendChild(img);

        // Calculate the distance and duration
        const distance = Math.sqrt(Math.pow(endX - startX, 2) + Math.pow(endY - startY, 2));
        const duration = distance / 100; // Adjust this value to change speed

        // Start animation
        setTimeout(() => {
            img.style.opacity = '1';
            img.style.transform = `translate(${endX - startX}px, ${endY - startY}px)`;
            img.style.transition = `transform ${duration}s linear, opacity 0.5s ease-in-out`;
        }, 100);

        // Remove the image after animation
        setTimeout(() => {
            img.remove();
        }, duration * 1000 + 600);
    }

    function startRandomFlying() {
        setInterval(() => {
            if (Math.random() < 0.3) { // 30% chance to create a flying image
                createFlyingImage();
            }
        }, 3000); // Check every 3 seconds
    }

    // Start the random flying effect when the page loads
    window.addEventListener('load', startRandomFlying);
    </script>
